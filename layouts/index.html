{{ define "main" }}

<section style="display:flex;justify-content:center;margin-top:100px;">

  <div style="
    max-width:500px;
    width:100%;
    padding:40px;
    border-radius:16px;
    background:#000;
    color:#fff;
    text-align:center;
  ">

    <h1 style="font-size:28px;margin-bottom:10px;">
      eddy's blog
    </h1>

    <p style="color:rgba(255,255,255,0.6);margin-bottom:40px;">
      最低门槛的人生解决方案
    </p>

    <form
      action="https://eddylyu.substack.com/api/v1/free"
      method="post"
      target="_blank"
      style="
        display:flex;
        border-bottom:1px solid rgba(255,255,255,0.3);
        padding-bottom:10px;
      "
    >
      <input
        type="email"
        name="email"
        placeholder="输入邮箱"
        required
        style="
          flex:1;
          border:none;
          outline:none;
          font-size:16px;
          background:transparent;
          color:#fff;
        "
      />

      <button
        type="submit"
        style="
          border:none;
          background:none;
          font-size:16px;
          cursor:pointer;
          color:#fff;
        "
      >
        Join
      </button>
    </form>

  </div>

</section>

{{ end }}
